name: Heartbeat
on:
  schedule: [{cron: '0 */6 * * *'}]
  workflow_dispatch:
jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: python runtime/main.py
        env:
          AGENT_NAME: youtube-publisher
          AGENT_ID: '9'
